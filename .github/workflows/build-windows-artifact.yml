name: Build Windows Artifact

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional Git tag for the downloadable release asset
        required: false
        type: string
      release_name:
        description: Optional GitHub Release title
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows-artifact:
    runs-on: windows-latest

    env:
      DOTNET_VERSION: 10.0.x
      TARGET_FRAMEWORK: net10.0-windows10.0.19041.0
      CONFIGURATION: Release
      BUILD_OUTPUT_DIR: ${{ github.workspace }}\src\LightPad.App\bin\Release\net10.0-windows10.0.19041.0\win-x64
      ARTIFACT_DIR: ${{ github.workspace }}\artifacts\LightPad-win-x64
      ZIP_PATH: ${{ github.workspace }}\artifacts\lightpad-win-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore solution
        run: dotnet restore LightPad.sln

      - name: Build Windows app
        run: >
          dotnet build LightPad.sln
          -c $env:CONFIGURATION
          -f $env:TARGET_FRAMEWORK

      - name: Stage artifact contents
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:ARTIFACT_DIR | Out-Null
          Copy-Item -Path "$env:BUILD_OUTPUT_DIR\*" -Destination $env:ARTIFACT_DIR -Recurse -Force
          @"
          LightPad Windows artifact

          Build: Release
          Framework: $env:TARGET_FRAMEWORK
          Output layout: unpackaged build folder from bin\Release

          Steps:
          1. Download and extract this artifact on the Surface.
          2. Open the extracted folder.
          3. Run LightPad.App.exe.

          Notes:
          - This workflow currently packages the validated win-x64 build output.
          - On Windows on ARM, try this under x64 emulation if needed.
          - If Windows Smart App Control or another application control policy blocks it,
            allow the app or disable that policy on the target device first.
          "@ | Set-Content -Path "$env:ARTIFACT_DIR\RUN_ON_SURFACE.txt"

      - name: Create zip package
        shell: pwsh
        run: |
          if (Test-Path $env:ZIP_PATH) {
            Remove-Item $env:ZIP_PATH -Force
          }
          Compress-Archive -Path "$env:ARTIFACT_DIR\*" -DestinationPath $env:ZIP_PATH

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          $tagInput = "${{ inputs.release_tag }}"
          $nameInput = "${{ inputs.release_name }}"
          $tag = if ([string]::IsNullOrWhiteSpace($tagInput)) { "surface-build-${{ github.run_number }}" } else { $tagInput.Trim() }
          $name = if ([string]::IsNullOrWhiteSpace($nameInput)) { "Surface build $tag" } else { $nameInput.Trim() }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: lightpad-win-x64
          path: ${{ env.ARTIFACT_DIR }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: ${{ env.ZIP_PATH }}
